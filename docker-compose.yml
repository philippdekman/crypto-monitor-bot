version: "3.9"
services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_monitor
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
